name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names; warn on style
          flake8 app.py backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py backend/ --count --max-line-length=120 --exit-zero --statistics

      - name: Run tests
        env:
          OPENAI_API_KEY: "test-key-not-real"
          DATA_ROOT: "/tmp/test_data"
          USERS: "testuser:testpass"
        run: |
          pytest tests/ -v --tb=short || echo "No tests found yet — skipping."